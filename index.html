<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Dare & Desire">
  <meta name="theme-color" content="#07030c">
  <title>Dare &amp; Desire</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Cinzel:wght@400;600;900&display=swap" rel="stylesheet">
  <style>
:root {
  --bg:#07030c; --surface:#130920; --crimson:#8b1a2b; --crimson2:#c41e3a;
  --gold:#c9a84c; --gold-l:#e2c16a; --gold-d:#7a6220;
  --cream:#f0e6d3; --cream-d:#8a7a6a; --white:#fff8f2;
  --blue:#7eb4e0; --pink:#e07eb4; --purple-d:#5a3a90;
  --femme:#d4a0c0; --speeltje:#a0c4d4;
  --r:14px; --r-lg:22px; --footer-h:68px; --footer-open:220px;
  --touch:52px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{height:100%;overflow:hidden;background:var(--bg);color:var(--cream);font-family:'Cormorant Garamond',Georgia,serif;font-size:clamp(17px,4vw,19px);-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 15% 88%,rgba(139,26,43,.22) 0%,transparent 55%),radial-gradient(ellipse 60% 50% at 85% 12%,rgba(155,111,214,.13) 0%,transparent 55%),radial-gradient(ellipse 45% 35% at 50% 50%,rgba(201,168,76,.04) 0%,transparent 60%);pointer-events:none;z-index:0;animation:bgBreathe 9s ease-in-out infinite}
@keyframes bgBreathe{0%,100%{opacity:.7}50%{opacity:1}}

.screen{display:none;position:fixed;inset:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.screen.active{display:flex;flex-direction:column;animation:screenIn .3s ease forwards}
@keyframes screenIn{from{opacity:0}to{opacity:1}}
.screen-inner{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:max(2.8rem,env(safe-area-inset-top)) 1.4rem calc(var(--footer-h) + 2rem);min-height:100%}
.screen-inner.no-footer{padding-bottom:max(2.5rem,env(safe-area-inset-bottom))}
.screen-inner.top{justify-content:flex-start;padding-top:max(5.5rem,calc(env(safe-area-inset-top) + 4.5rem))}

h1{font-family:'Cinzel',serif;font-size:clamp(1.9rem,8.5vw,3.2rem);font-weight:900;background:linear-gradient(140deg,var(--gold-l) 0%,var(--gold) 45%,var(--crimson2) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:.1em;text-align:center;line-height:1.1}
h2{font-family:'Cinzel',serif;font-size:clamp(.85rem,3.2vw,1.2rem);font-weight:600;color:var(--gold-l);letter-spacing:.07em;text-align:center}
.lbl{font-family:'Cinzel',serif;font-size:clamp(.55rem,2vw,.65rem);letter-spacing:.2em;text-transform:uppercase;color:var(--cream-d)}
.italic{font-style:italic;font-size:clamp(.9rem,3.5vw,1rem);color:var(--cream-d);text-align:center;line-height:1.65}
.div{width:100%;max-width:300px;height:1px;background:linear-gradient(90deg,transparent,var(--gold-d) 25%,var(--crimson) 50%,var(--purple-d) 75%,transparent);margin:1rem auto;opacity:.5}
.sx{height:.4rem}.sm{height:.9rem}.smd{height:1.4rem}.slg{height:2rem}

.logo-icon{font-size:3rem;display:block;text-align:center;animation:logoFloat 4.5s ease-in-out infinite}
@keyframes logoFloat{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-7px) scale(1.05)}}
.player-names{display:flex;align-items:center;gap:1rem;font-family:'Cinzel',serif}
.pname{font-size:clamp(1.1rem,4.5vw,1.6rem);font-weight:600;letter-spacing:.1em}
.pname.daddy{color:var(--blue)}.pname.meisje{color:var(--pink)}
.pname.femme{color:var(--femme)}.pname.speeltje{color:var(--speeltje)}
.pdivider{color:var(--gold);opacity:.45}

/* ── ROL KEUZE KNOPPEN ── */
.rol-keuze{display:flex;flex-direction:column;gap:1rem;width:100%;max-width:360px}
.rol-btn{
  width:100%;min-height:80px;padding:1.1rem 1.6rem;
  border:1.5px solid rgba(201,168,76,.2);border-radius:var(--r-lg);
  background:var(--surface);
  cursor:pointer;user-select:none;-webkit-user-select:none;
  transition:all .2s;text-align:center;
}
.rol-btn:active{transform:scale(.97)}
.rol-btn-title{font-family:'Cinzel',serif;font-size:clamp(.8rem,3vw,1rem);font-weight:600;letter-spacing:.1em;margin-bottom:.35rem}
.rol-btn-sub{font-style:italic;font-size:clamp(.78rem,3vw,.9rem);color:var(--cream-d);line-height:1.4}
.rol-btn.dm{border-color:rgba(126,180,224,.3);background:rgba(126,180,224,.05)}
.rol-btn.dm:active,.rol-btn.dm:hover{border-color:rgba(126,180,224,.6);background:rgba(126,180,224,.1)}
.rol-btn.dm .rol-btn-title{background:linear-gradient(90deg,var(--blue),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.rol-btn.fs{border-color:rgba(212,160,192,.3);background:rgba(212,160,192,.05)}
.rol-btn.fs:active,.rol-btn.fs:hover{border-color:rgba(212,160,192,.6);background:rgba(212,160,192,.1)}
.rol-btn.fs .rol-btn-title{background:linear-gradient(90deg,var(--femme),var(--speeltje));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

.btn{display:block;width:100%;max-width:360px;min-height:var(--touch);padding:.9rem 1.8rem;border:none;border-radius:var(--r);font-family:'Cinzel',serif;font-size:clamp(.72rem,2.8vw,.82rem);font-weight:600;letter-spacing:.12em;text-align:center;cursor:pointer;user-select:none;transition:transform .15s,opacity .15s;-webkit-user-select:none}
.btn:active{transform:scale(.96)}.btn+.btn{margin-top:.7rem}.btn:disabled{opacity:.28;pointer-events:none}
.btn-primary{background:linear-gradient(135deg,var(--crimson),var(--crimson2));color:var(--white);animation:hbCrimson 2s ease-in-out infinite}
.btn-gold{background:linear-gradient(135deg,var(--gold-d),var(--gold));color:#180e00;animation:hbGold 2.2s ease-in-out infinite}
.btn-outline{background:transparent;border:1px solid rgba(201,168,76,.3);color:var(--gold)}
.btn-outline:active{background:rgba(201,168,76,.07)}
.btn-ghost{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);color:var(--cream-d);font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(.9rem,3.5vw,1rem);letter-spacing:.04em}
.btn-ok{background:linear-gradient(135deg,#142814,#1d5c1d);color:#80e080;box-shadow:0 4px 20px rgba(30,92,30,.25)}
.btn-fail{background:linear-gradient(135deg,#280a0a,#5c1414);color:#e08080;box-shadow:0 4px 20px rgba(92,20,20,.25)}
.btn-reroll{background:rgba(201,168,76,.05);border:1px solid rgba(201,168,76,.18);color:rgba(201,168,76,.55);font-size:clamp(.66rem,2.5vw,.74rem);min-height:44px;padding:.6rem 1.4rem;letter-spacing:.13em}
.btn-reroll:active{background:rgba(201,168,76,.12);color:var(--gold)}

.choice-group{width:100%;max-width:360px;margin-bottom:.95rem}
.choice-group-lbl{font-family:'Cinzel',serif;font-size:clamp(.54rem,2vw,.62rem);letter-spacing:.2em;text-transform:uppercase;color:var(--cream-d);text-align:center;margin-bottom:.55rem}
.choice-row{display:flex;gap:.5rem}
.cbtn{flex:1;min-height:var(--touch);padding:.85rem .3rem;background:var(--surface);border:1.5px solid rgba(201,168,76,.08);border-radius:var(--r);font-family:'Cinzel',serif;font-size:clamp(.62rem,2.4vw,.72rem);font-weight:600;letter-spacing:.06em;color:var(--cream-d);text-align:center;cursor:pointer;user-select:none;transition:all .2s;-webkit-user-select:none}
.cbtn.s-mild     {border-color:var(--gold);   color:var(--gold);   background:rgba(201,168,76,.08);animation:selGlow 1.6s ease-in-out infinite}
.cbtn.s-spicy    {border-color:#ff6060;        color:#ff6060;       background:rgba(255,96,96,.08); animation:selGlow 1.6s ease-in-out infinite}
.cbtn.s-vraag    {border-color:var(--blue);    color:var(--blue);   background:rgba(126,180,224,.08);animation:selGlow 1.6s ease-in-out infinite}
.cbtn.s-voorspel {border-color:#d4a0c0;        color:#d4a0c0;       background:rgba(212,160,192,.08);animation:selGlow 1.6s ease-in-out infinite}
.cbtn.s-hoofdspel{border-color:var(--crimson2);color:var(--crimson2);background:rgba(196,30,58,.08); animation:selGlow 1.6s ease-in-out infinite}
@keyframes selGlow{0%,100%{filter:brightness(1)}50%{filter:brightness(1.45) saturate(1.3)}}

.score-row{display:flex;gap:1.8rem;justify-content:center;align-items:center}
.score-item{text-align:center}
.score-num{font-family:'Cinzel',serif;font-size:clamp(1.6rem,7vw,2.1rem);font-weight:900;line-height:1}
.score-num.daddy{color:var(--blue)}.score-num.meisje{color:var(--pink)}
.score-num.femme{color:var(--femme)}.score-num.speeltje{color:var(--speeltje)}
.score-label{font-family:'Cinzel',serif;font-size:clamp(.5rem,1.8vw,.58rem);letter-spacing:.12em;color:var(--cream-d);margin-top:.2rem}

.q-card{width:100%;max-width:380px;background:var(--surface);border:1px solid rgba(201,168,76,.2);border-radius:var(--r-lg);padding:clamp(1.4rem,5vw,2rem) clamp(1.2rem,4vw,1.6rem);text-align:center;box-shadow:0 8px 48px rgba(0,0,0,.65);animation:cardIn .42s cubic-bezier(.34,1.56,.64,1) forwards,cardPulse 3.5s .5s ease-in-out infinite}
@keyframes cardIn{from{opacity:0;transform:scale(.87) translateY(24px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes cardPulse{0%,100%{box-shadow:0 8px 48px rgba(0,0,0,.65)}50%{box-shadow:0 12px 64px rgba(0,0,0,.75),0 0 44px rgba(201,168,76,.12),0 0 0 1px rgba(201,168,76,.2)}}
.q-tags{display:flex;flex-wrap:wrap;gap:.3rem;justify-content:center;margin-bottom:.75rem}
.q-tag{padding:.22rem .6rem;border-radius:20px;font-family:'Cinzel',serif;font-size:clamp(.48rem,1.8vw,.56rem);letter-spacing:.12em;text-transform:uppercase}
.qt-opdracht{background:rgba(196,30,58,.12);color:#e05070;border:1px solid rgba(196,30,58,.25)}
.qt-vraag{background:rgba(126,180,224,.12);color:var(--blue);border:1px solid rgba(126,180,224,.25)}
.qt-mild{background:rgba(201,168,76,.1);color:var(--gold)}
.qt-spicy{background:rgba(255,96,96,.1);color:#ff7575}
.qt-fase{background:rgba(212,160,192,.08);color:#c890aa}
.q-text{font-size:clamp(1.1rem,4.2vw,1.4rem);font-style:italic;color:var(--white);line-height:1.75;margin:.7rem 0 .4rem}

.judge-lbl{font-family:'Cinzel',serif;font-size:clamp(.54rem,2vw,.62rem);letter-spacing:.18em;color:var(--cream-d);text-transform:uppercase;text-align:center;margin:1.1rem 0 .7rem}

.turn-name{font-family:'Cinzel',serif;font-size:clamp(2.6rem,14vw,5rem);font-weight:900;text-align:center;line-height:1}
.turn-name.daddy{color:var(--blue);text-shadow:0 0 60px rgba(126,180,224,.35)}
.turn-name.meisje{color:var(--pink);text-shadow:0 0 60px rgba(224,126,180,.35)}
.turn-name.femme{color:var(--femme);text-shadow:0 0 60px rgba(212,160,192,.35)}
.turn-name.speeltje{color:var(--speeltje);text-shadow:0 0 60px rgba(160,196,212,.35)}

#score-flash{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);font-family:'Cinzel',serif;font-size:5rem;font-weight:900;pointer-events:none;z-index:200;opacity:0;transition:transform .18s cubic-bezier(.34,1.56,.64,1),opacity .35s ease}
#score-flash.pos{color:#80e080;text-shadow:0 0 50px rgba(80,220,80,.7)}
#score-flash.neg{color:#e08080;text-shadow:0 0 50px rgba(220,80,80,.7)}
#score-flash.show{transform:translate(-50%,-50%) scale(1);opacity:1}
#score-flash.hide{transform:translate(-50%,-50%) scale(1.4);opacity:0}

/* ── CLIMAX HOLD BUTTON ── */
.btn-climax-hold{
  position:fixed;top:max(1rem,env(safe-area-inset-top));right:1rem;
  width:68px;height:68px;border-radius:50%;
  background:radial-gradient(circle at 38% 32%,rgba(201,168,76,.15),rgba(139,26,43,.2));
  border:1.5px solid rgba(201,168,76,.28);
  cursor:pointer;z-index:50;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;
  -webkit-user-select:none;user-select:none;touch-action:none;
  transition:border-color .2s,box-shadow .2s;
}
.btn-climax-hold:hover{border-color:rgba(201,168,76,.5);box-shadow:0 0 18px rgba(201,168,76,.2)}
.climax-icon{font-size:1.25rem;line-height:1;pointer-events:none}
.climax-label{font-family:'Cinzel',serif;font-size:.3rem;letter-spacing:.14em;color:rgba(201,168,76,.5);text-transform:uppercase;pointer-events:none}
.climax-ring-wrap{position:absolute;inset:0;pointer-events:none}
.climax-ring-wrap svg{width:100%;height:100%;transform:rotate(-90deg)}
.climax-ring-bg{fill:none;stroke:rgba(201,168,76,.1);stroke-width:3}
.climax-ring-fill{fill:none;stroke:var(--gold-l);stroke-width:3;stroke-linecap:round;stroke-dasharray:0 251;filter:drop-shadow(0 0 5px rgba(226,193,106,.8))}

/* ── LOCK BADGE ── */
.lock-badge{
  width:100%;max-width:360px;margin-bottom:.5rem;
  background:rgba(196,30,58,.07);border:1px solid rgba(196,30,58,.18);
  border-radius:var(--r);padding:.5rem 1rem;
  font-family:'Cinzel',serif;font-size:clamp(.5rem,1.8vw,.58rem);letter-spacing:.1em;
  color:rgba(240,200,200,.55);
  display:none;align-items:center;justify-content:space-between;gap:.5rem;
}
.lock-badge.visible{display:flex}
.lock-badge-text{flex:1;text-align:left}
.lock-badge-change{color:rgba(201,168,76,.45);cursor:pointer;white-space:nowrap;font-size:clamp(.46rem,1.6vw,.52rem)}
.lock-badge-change:active{color:var(--gold)}

/* ── AVONDREGELS ── */
.rules-card{width:100%;max-width:360px;background:var(--surface);border:1px solid rgba(201,168,76,.12);border-radius:var(--r-lg);padding:1.3rem;margin-bottom:.8rem}
.rules-card-header{font-family:'Cinzel',serif;font-size:clamp(.6rem,2.2vw,.68rem);letter-spacing:.2em;text-transform:uppercase;margin-bottom:.8rem;display:flex;align-items:center;justify-content:space-between}
.rules-card-header.daddy{color:var(--blue)}.rules-card-header.meisje{color:var(--pink)}
.rules-card-header.femme{color:var(--femme)}.rules-card-header.speeltje{color:var(--speeltje)}
.rule-item{font-style:italic;font-size:clamp(.85rem,3.2vw,.95rem);color:var(--cream);line-height:1.55;padding:.5rem 0;border-bottom:1px solid rgba(255,255,255,.05)}
.rule-item:last-child{border-bottom:none;padding-bottom:0}
.rule-item.rule-vast{color:var(--gold-l)}
.rule-num{font-family:'Cinzel',serif;font-size:clamp(.48rem,1.8vw,.55rem);color:var(--gold-d);letter-spacing:.1em;margin-bottom:.16rem}
.rule-vast-badge{font-family:'Cinzel',serif;font-size:clamp(.4rem,1.5vw,.48rem);letter-spacing:.12em;color:var(--gold-d);border:1px solid rgba(201,168,76,.2);border-radius:10px;padding:.1rem .4rem}
.btn-reroll-rules{background:rgba(201,168,76,.05);border:1px solid rgba(201,168,76,.15);color:rgba(201,168,76,.45);font-family:'Cinzel',serif;font-size:clamp(.44rem,1.6vw,.52rem);letter-spacing:.1em;padding:.28rem .7rem;border-radius:10px;cursor:pointer;transition:all .2s;white-space:nowrap}
.btn-reroll-rules:active{background:rgba(201,168,76,.12);color:var(--gold)}

#rules-footer{position:fixed;bottom:0;left:0;right:0;background:rgba(9,4,18,.97);border-top:1px solid rgba(201,168,76,.14);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);z-index:40;height:var(--footer-h);transition:height .32s cubic-bezier(.4,0,.2,1);display:none;overflow:hidden;padding-bottom:env(safe-area-inset-bottom)}
#rules-footer.visible{display:block}
#rules-footer.open{height:var(--footer-open)}
.footer-toggle{display:flex;align-items:center;justify-content:space-between;padding:.6rem 1.2rem .35rem;cursor:pointer;min-height:44px}
.footer-player-label{font-family:'Cinzel',serif;font-size:clamp(.54rem,2vw,.62rem);letter-spacing:.2em;text-transform:uppercase}
.footer-player-label.daddy{color:var(--blue)}.footer-player-label.meisje{color:var(--pink)}
.footer-player-label.femme{color:var(--femme)}.footer-player-label.speeltje{color:var(--speeltje)}
.footer-chevron{font-size:.65rem;color:var(--gold-d);transition:transform .3s ease}
#rules-footer.open .footer-chevron{transform:rotate(180deg)}
.footer-compact-rules{padding:0 1.2rem .4rem;display:flex;flex-direction:column;gap:.1rem}
.footer-compact-rule{font-style:italic;font-size:clamp(.62rem,2.2vw,.7rem);color:rgba(138,122,106,.7);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.45}
.footer-full-rules{padding:.3rem 1.2rem 1rem;display:flex;flex-direction:column;gap:.55rem;overflow-y:auto;opacity:0;transition:opacity .2s ease .1s}
#rules-footer.open .footer-full-rules{opacity:1}
.footer-full-rule{font-style:italic;font-size:clamp(.8rem,3vw,.9rem);color:var(--cream);line-height:1.55;padding-left:1rem;position:relative}
.footer-full-rule::before{content:'♦';position:absolute;left:0;top:.12rem;font-size:.42rem;color:var(--gold-d);font-style:normal}

/* ── CLIMAX CHOICE ── */
.climax-winner-lbl{font-family:'Cinzel',serif;font-size:clamp(.54rem,2vw,.64rem);letter-spacing:.28em;text-transform:uppercase;color:var(--cream-d);text-align:center}
.climax-winner-name{font-family:'Cinzel',serif;font-size:clamp(2rem,10vw,3.4rem);font-weight:900;line-height:1.05;text-align:center;animation:wGlow 2.5s ease-in-out infinite alternate}
.climax-winner-name.daddy{color:var(--blue)}.climax-winner-name.meisje{color:var(--pink)}.climax-winner-name.draw{color:var(--gold)}
.climax-winner-name.femme{color:var(--femme)}.climax-winner-name.speeltje{color:var(--speeltje)}
.climax-sub{font-style:italic;font-size:clamp(.82rem,3.2vw,.96rem);color:var(--cream-d);text-align:center;line-height:1.55;max-width:310px;margin:.3rem auto .6rem}
.climax-cards{width:100%;max-width:380px;display:flex;flex-direction:column;gap:.65rem}
.climax-option{
  width:100%;background:var(--surface);border:1px solid rgba(201,168,76,.15);
  border-radius:var(--r-lg);padding:1rem 1.2rem;text-align:center;
  cursor:pointer;user-select:none;-webkit-user-select:none;
  transition:all .2s;
  font-style:italic;font-size:clamp(1rem,3.8vw,1.18rem);color:var(--white);line-height:1.65;
}
.climax-option:active{transform:scale(.97);border-color:rgba(201,168,76,.5);background:rgba(201,168,76,.07)}
.climax-option-num{font-family:'Cinzel',serif;font-size:clamp(.44rem,1.6vw,.52rem);letter-spacing:.2em;color:var(--gold-d);text-transform:uppercase;margin-bottom:.35rem}

/* ── CLIMAX REVEAL ── */
.climax-reveal-glow{position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse 80% 60% at 50% 50%,rgba(139,26,43,.32) 0%,rgba(201,168,76,.06) 55%,transparent 80%);animation:wPulse 3s ease-in-out infinite}
.climax-reveal-wlbl{font-family:'Cinzel',serif;font-size:clamp(.5rem,1.8vw,.6rem);letter-spacing:.28em;text-transform:uppercase;color:var(--cream-d);text-align:center}
.climax-reveal-wname{font-family:'Cinzel',serif;font-size:clamp(1.6rem,8vw,2.4rem);font-weight:900;text-align:center;line-height:1;animation:wGlow 2.5s ease-in-out infinite alternate}
.climax-reveal-wname.daddy{color:var(--blue)}.climax-reveal-wname.meisje{color:var(--pink)}.climax-reveal-wname.draw{color:var(--gold)}
.climax-reveal-wname.femme{color:var(--femme)}.climax-reveal-wname.speeltje{color:var(--speeltje)}
.climax-big-card{
  width:100%;max-width:380px;
  background:linear-gradient(155deg,rgba(139,26,43,.2),rgba(19,9,32,.98));
  border:1px solid rgba(201,168,76,.4);border-radius:var(--r-lg);
  padding:clamp(1.8rem,6vw,2.6rem) clamp(1.4rem,5vw,2rem);
  text-align:center;

async function tryAutoLoad(){

function validateData(d){

function handleJsonFile(e){
  const f=e.target.files[0]; if(!f) return;

      if(validateData(json)){ DATA=json; setNotice('✦ Opdrachten geladen','loaded'); document.getElementById('btn-load-json').style.display='none'; }

    }catch{ setNotice('Bestand kon niet worden gelezen','error'); }
  };
  r.readAsText(f); e.target.value='';
}

reqWL();

/* ══ CLIMAX HOLD ══ */
const HOLD_MS=800;
const CIRC=2*Math.PI*29;

function setupClimaxBtn(btnId, ringId){
  const btn=document.getElementById(btnId);
  const ring=document.getElementById(ringId);
  let timer=null, start=null, raf=null;
  function begin(e){
    e.preventDefault();
    start=Date.now();
    timer=setTimeout(()=>{ cancel(); showClimaxChoice(); }, HOLD_MS);
    raf=requestAnimationFrame(function tick(){
      if(!start) return;
      const p=Math.min((Date.now()-start)/HOLD_MS,1);
      ring.setAttribute('stroke-dasharray',`${p*CIRC} ${CIRC}`);
      if(p<1) raf=requestAnimationFrame(tick);
    });
  }
  function cancel(){
    clearTimeout(timer); timer=null;
    cancelAnimationFrame(raf); raf=null; start=null;
    ring.setAttribute('stroke-dasharray',`0 ${CIRC}`);
  }
  btn.addEventListener('mousedown',begin);
  btn.addEventListener('touchstart',begin,{passive:false});
  btn.addEventListener('mouseup',cancel);
  btn.addEventListener('mouseleave',cancel);
  btn.addEventListener('touchend',cancel);
  btn.addEventListener('touchcancel',cancel);
}

}

}

function pickRules(playerData, hasVast){
  const rules = [];
  if(hasVast && playerData.vast){
    rules.push({ text: playerData.vast, vast: true });
  }
  const pool = [...(playerData.random || [])].sort(()=>Math.random()-.5);
  const needed = 3 - rules.length;
  pool.slice(0, needed).forEach(t => rules.push({ text: t, vast: false }));
  return rules;
}

function initRules(){
  const rc = ROL[G.rol];

  h1.className = `rules-card-header ${rc.p1.cls}`;
  lbl2.textContent = rc.p2.label;
  h2.className = `rules-card-header ${rc.p2.cls}`;

  renderRulesBlock('rules-list-p1', G.assignedRules.p1);
  renderRulesBlock('rules-list-p2', G.assignedRules.p2);
}

function renderRulesBlock(id, rules){
  document.getElementById(id).innerHTML = rules.map((r,i) => `
    <div class="rule-item${r.vast?' rule-vast':''}">
      <div class="rule-num">REGEL ${i+1}${r.vast?' &nbsp;<span class="rule-vast-badge">VAST</span>':''}</div>
      ${r.text}
    </div>`).join('');
}

function rerollRules(player){
  const rc = ROL[G.rol];
  const rd = getRulesData();
  const isP2 = player === 'p2';

  if(isP2){
    // p2 heeft vaste regel — herrol alleen de random
    const newRules = pickRules(rd.p2, true);
    G.assignedRules.p2 = newRules;
    renderRulesBlock('rules-list-p2', G.assignedRules.p2);
  } else {
    const newRules = pickRules(rd.p1, false);
    G.assignedRules.p1 = newRules;
    renderRulesBlock('rules-list-p1', G.assignedRules.p1);
  }
}

/* ══ GAME ══ */
function startGame(){
  G.useRules = true;
  G.scores = [0,0];
  G.recentShown = [];
  G.locked = {phase:null, intensity:null};
  G.current = Math.random() < .5 ? 0 : 1;

  // Score labels instellen
  const rc = ROL[G.rol];
  document.getElementById('turn-lbl-p1').textContent = rc.p1.name;
  document.getElementById('turn-lbl-p2').textContent = rc.p2.name;
  document.getElementById('turn-s-p1').style.color = `var(--${rc.p1.cls})`;
  document.getElementById('turn-s-p2').style.color = `var(--${rc.p2.cls})`;

  showTurnScreen();
}

function currentPlayerConfig(){
  const rc = ROL[G.rol];
  return G.current === 0 ? rc.p1 : rc.p2;
}

function showTurnScreen(){
  const pc = currentPlayerConfig();
  document.getElementById('turn-lbl-top').textContent = 'Geef het scherm aan';
  const tn = document.getElementById('turn-name-big');
  tn.textContent = pc.name;
  tn.className = `turn-name fu-1 ${pc.cls}`;

  document.getElementById('turn-s-p1').textContent = G.scores[0];
  document.getElementById('turn-s-p2').textContent = G.scores[1];

  const badge = document.getElementById('lock-badge');
  const chooser = document.getElementById('phase-chooser');
  const revBtn = document.getElementById('btn-reveal');

  if(G.locked.phase){
    const pLabel = G.locked.phase==='voorspel' ? 'Voorspel' : 'Hoofdspel';
    const iLabel = G.locked.intensity==='mild' ? 'Mild' : G.locked.intensity==='spicy' ? 'Spicy 🌶' : 'Vraag';
    document.getElementById('lock-badge-text').textContent = `🔒 ${pLabel} · ${iLabel}`;
    badge.classList.add('visible');
    chooser.style.display = 'none';
    revBtn.disabled = false;
    G.sel.phase = G.locked.phase;
    G.sel.intensity = G.locked.intensity;
  } else {
    badge.classList.remove('visible');
    chooser.style.display = 'block';
    resetChooser();
    revBtn.disabled = true;
  }
  showScreen('screen-turn');
}

function resetChooser(){
  G.sel.phase = null; G.sel.intensity = null;
  ['btn-voorspel','btn-hoofdspel'].forEach(id=>{ const el=document.getElementById(id); if(el) el.className='cbtn'; });
  document.getElementById('intensity-group').style.display = 'none';
}

function unlockCategory(){
  G.locked = {phase:null, intensity:null};
  document.getElementById('lock-badge').classList.remove('visible');
  document.getElementById('phase-chooser').style.display = 'block';
  resetChooser();
  document.getElementById('btn-reveal').disabled = true;
}

function selectPhase(v){
  G.sel.phase = v; G.sel.intensity = null;
  ['voorspel','hoofdspel'].forEach(p=>{ const el=document.getElementById(`btn-${p}`); if(el) el.className='cbtn'+(v===p?` s-${p}`:''); });
  const ig = document.getElementById('intensity-group');
  const row = document.getElementById('intensity-row');
  const lbl = document.getElementById('intensity-lbl');
  ig.style.display = '';
  const rc = ROL[G.rol];
  if(v === 'voorspel' && rc.hasVraag){
    lbl.textContent = 'Keuze';
    row.innerHTML = `
      <button class="cbtn" id="btn-vraag"  onclick="selectIntensity('vraag')">VRAAG</button>
      <button class="cbtn" id="btn-mild"   onclick="selectIntensity('mild')">MILD</button>
      <button class="cbtn" id="btn-spicy"  onclick="selectIntensity('spicy')">SPICY 🌶</button>`;
  } else {
    lbl.textContent = 'Intensiteit';
    row.innerHTML = `
      <button class="cbtn" id="btn-mild"  onclick="selectIntensity('mild')">MILD</button>
      <button class="cbtn" id="btn-spicy" onclick="selectIntensity('spicy')">SPICY 🌶</button>`;
  }
  checkReveal();
}

function selectIntensity(v){
  G.sel.intensity = v;
  document.querySelectorAll('#intensity-row .cbtn').forEach(b=>{ const k=b.id.replace('btn-',''); b.className='cbtn'+(k===v?` s-${k}`:''); });
  checkReveal();
}
function checkReveal(){ document.getElementById('btn-reveal').disabled = !(G.sel.phase && G.sel.intensity); }

/* ══ POOL & CARD ══ */
function pickFrom(pool, extra=[]){
  const excl = [...G.recentShown, ...extra];
  let c = pool.filter(t=>!excl.includes(t));
  if(!c.length) c = pool;
  return c[Math.floor(Math.random()*c.length)];
}
function addToRecent(t){
  G.recentShown = G.recentShown.filter(x=>x!==t);
  G.recentShown.push(t);
  if(G.recentShown.length > MAX_RECENT) G.recentShown.shift();
}

let currentCardText = '';

function getPool(){
  const rc = ROL[G.rol];
  const dk = rc.dataKey;
  const pk = G.current === 0 ? rc.p1.key : rc.p2.key;

  if(G.sel.phase === 'voorspel' && G.sel.intensity === 'vraag'){
    return DATA[dk].voorspel.vraag;
  }
  return DATA[dk][G.sel.phase][pk][G.sel.intensity];
}

function buildTags(){
  const rc = ROL[G.rol];
  const isVraag = G.sel.phase === 'voorspel' && G.sel.intensity === 'vraag';
  if(isVraag) return `<span class="q-tag qt-vraag">VRAAG</span><span class="q-tag qt-fase">voor beide</span>`;
  const it = G.sel.intensity === 'mild'
    ? '<span class="q-tag qt-mild">MILD</span>'
    : '<span class="q-tag qt-spicy">SPICY 🌶</span>';
  return `<span class="q-tag qt-opdracht">OPDRACHT</span>${it}<span class="q-tag qt-fase">${G.sel.phase}</span>`;
}

function renderCard(isReroll){
  const pool = getPool();
  const text = pickFrom(pool, isReroll ? [currentCardText] : []);
  currentCardText = text; addToRecent(text);
  document.getElementById('q-tags').innerHTML = buildTags();
  document.getElementById('q-text').textContent = text;
  const c = document.getElementById('q-card'); c.style.animation='none'; c.offsetHeight; c.style.animation='';
}

function revealCard(){
  G.locked.phase = G.sel.phase; G.locked.intensity = G.sel.intensity;
  const isVraag = G.sel.phase === 'voorspel' && G.sel.intensity === 'vraag';
  const rc = ROL[G.rol];
  const otherName = G.current === 0 ? rc.p2.name : rc.p1.name;
  document.getElementById('judge-lbl').textContent = isVraag ? 'Allebei beantwoorden:' : `Laat ${otherName} beoordelen:`;
  document.getElementById('judge-sec').style.display = 'block';
  document.getElementById('reroll-sec').style.display = 'block';
  renderCard(false);
  showScreen('screen-card');
}
function rerollCard(){ renderCard(true); }

/* ══ JUDGE ══ */
function judge(ok){
  G.scores[G.current] += ok ? 1 : -1;
  burstParticles(ok);
  const fl = document.getElementById('score-flash');
  fl.textContent = ok ? '+1' : '−1';
  fl.className = ok ? 'pos show' : 'neg show';
  document.querySelectorAll('#judge-sec .btn').forEach(b=>b.disabled=true);
  document.getElementById('reroll-sec').style.display = 'none';
  setTimeout(()=>{ fl.className = fl.className.replace('show','hide'); }, 700);
  setTimeout(()=>{
    fl.className = '';
    document.querySelectorAll('#judge-sec .btn').forEach(b=>b.disabled=false);
    G.current = 1 - G.current;
    showTurnScreen();
  }, 1300);
}

/* ══ FOOTER ══ */
function updateFooter(){
  const rc = ROL[G.rol];
  const pc = currentPlayerConfig();
  const rules = G.current === 0 ? G.assignedRules.p1 : G.assignedRules.p2;
  const lbl = document.getElementById('footer-label');
  lbl.textContent = `♦ ${pc.name}'s regels`;
  lbl.className = `footer-player-label ${pc.cls}`;
  document.getElementById('footer-compact').innerHTML = rules.map(r=>`<div class="footer-compact-rule">${r.text.length>60?r.text.slice(0,57)+'…':r.text}</div>`).join('');
  document.getElementById('footer-full').innerHTML = rules.map(r=>`<div class="footer-full-rule">${r.text}</div>`).join('');
}
function toggleFooter(){
  const f=document.getElementById('rules-footer');
  const c=document.getElementById('footer-compact');
  const fl=document.getElementById('footer-full');
  if(f.classList.contains('open')){ f.classList.remove('open'); setTimeout(()=>{ fl.style.display='none'; c.style.display=''; },150); }
  else{ c.style.display='none'; fl.style.display=''; requestAnimationFrame(()=>f.classList.add('open')); }
}

/* ══ CLIMAX FLOW ══ */
function showClimaxChoice(){
  const [s0,s1] = G.scores;
  const isDraw = s0 === s1;
  const wi = s0 > s1 ? 0 : 1;
  const rc = ROL[G.rol];
  const wpc = wi === 0 ? rc.p1 : rc.p2;
  const dk = rc.dataKey;

  const wLbl = document.getElementById('cc-winner-lbl');
  const wNameEl = document.getElementById('cc-winner-name');
  const sub = document.getElementById('cc-sub');

  if(isDraw){
    wLbl.textContent = 'GELIJKSPEL';
    wNameEl.textContent = `${rc.p1.name} ♦ ${rc.p2.name}`;
    wNameEl.className = 'climax-winner-name fu-1 draw';
    sub.textContent = 'Jullie staan quitte — overleg samen welke heerlijke optie jullie kiezen om vanavond mee te eindigen.';
  } else {
    wLbl.textContent = 'WINNAAR';
    wNameEl.textContent = wpc.name;
    wNameEl.className = `climax-winner-name fu-1 ${wpc.cls}`;
    sub.textContent = `Kies jouw beloning, ${wpc.name}. Dit heb je verdiend.`;
  }

  let opts;
  if(isDraw){
    const pm = [...DATA[dk].climax[rc.p1.key]].sort(()=>Math.random()-.5);
    const pf = [...DATA[dk].climax[rc.p2.key]].sort(()=>Math.random()-.5);
    opts = [pm[0], pf[0], pm[1]||pf[1]||pm[0]];
  } else {
    const g = wi === 0 ? rc.p1.key : rc.p2.key;
    opts = [...DATA[dk].climax[g]].sort(()=>Math.random()-.5).slice(0,3);
  }
  while(opts.length < 3) opts.push(opts[0]);

  window._cx = {opts, isDraw, wName: isDraw ? `${rc.p1.name} ♦ ${rc.p2.name}` : wpc.name, wCls: isDraw ? 'draw' : wpc.cls};

  const container = document.getElementById('cc-cards');
  container.innerHTML = opts.map((_,i) => `
    <div class="climax-option" onclick="chooseClimaxByIdx(${i})">
      <div class="climax-option-num">Optie ${i+1}</div>
      <div class="climax-option-body"></div>
    </div>`).join('');
  container.querySelectorAll('.climax-option-body').forEach((el,i)=>{ el.textContent=opts[i]; });

  launchConfetti();
  showScreen('screen-climax-choice');
}

function chooseClimaxByIdx(idx){
  const {opts, isDraw, wName, wCls} = window._cx;
  const text = opts[idx];
  document.getElementById('cr-winner-lbl').textContent = isDraw ? 'GELIJKSPEL' : 'WINNAAR';
  const crName = document.getElementById('cr-winner-name');
  crName.textContent = wName;
  crName.className = `climax-reveal-wname fu-1 ${wCls}`;
  document.getElementById('cr-text').textContent = text;
  launchConfetti();
  showScreen('screen-climax-reveal');
}

/* ══ PARTICLES ══ */
function launchConfetti(){
  const cols = ['#c9a84c','#e2c16a','#8b1a2b','#c41e3a','#f0e6d3','#9b6fd6','#7eb4e0','#e07eb4'];
  for(let i=0;i<52;i++) setTimeout(()=>{
    const el=document.createElement('div'); el.className='conf';
    const sz=5+Math.random()*9;
    el.style.cssText=`left:${Math.random()*100}vw;top:-14px;width:${sz}px;height:${sz}px;background:${cols[Math.floor(Math.random()*cols.length)]};border-radius:${Math.random()>.45?'50%':'2px'};animation-duration:${1.4+Math.random()*2.8}s;`;
    document.body.appendChild(el); setTimeout(()=>el.remove(),4600);
  }, i*48);
}
function burstParticles(ok){
  const cols = ok ? ['#80e080','#50d050','#c0ffc0','#fff','#aaffaa'] : ['#e08080','#d05050','#ffc0c0','#fff','#ffaaaa'];
  for(let i=0;i<24;i++){
    const el=document.createElement('div');
    const a=(i/24)*Math.PI*2+Math.random()*.4, d=55+Math.random()*115, s=4+Math.random()*7;
    el.style.cssText=`position:fixed;left:50vw;top:50vh;width:${s}px;height:${s}px;border-radius:50%;background:${cols[Math.floor(Math.random()*cols.length)]};pointer-events:none;z-index:200;transform:translate(-50%,-50%);transition:transform .55s cubic-bezier(.2,1,.3,1),opacity .55s ease-out;opacity:1;`;
    document.body.appendChild(el);
    requestAnimationFrame(()=>requestAnimationFrame(()=>{ el.style.transform=`translate(calc(-50% + ${Math.cos(a)*d}px),calc(-50% + ${Math.sin(a)*d}px)) scale(0)`; el.style.opacity='0'; }));
    setTimeout(()=>el.remove(),660);
  }
}

/* ══ AMBIENT ══ */
(function(){
  const pal=['rgba(201,168,76,','rgba(196,30,58,','rgba(155,111,214,','rgba(201,168,76,','rgba(240,230,211,'];
  for(let i=0;i<22;i++){
    const el=document.createElement('div'), sz=2+Math.random()*5.5, col=pal[Math.floor(Math.random()*pal.length)], op=.09+Math.random()*.22, dur=10+Math.random()*15;
    el.className='amb';
    el.style.cssText=`width:${sz}px;height:${sz}px;background:${col}${op});left:${Math.random()*100}vw;bottom:-20px;--drift:${(Math.random()-.5)*85}px;animation-duration:${dur}s;animation-delay:${-(Math.random()*dur)}s;`;
    document.body.appendChild(el);
  }
})();

/* ══ INIT ══ */
setupClimaxBtn('climax-btn-turn','ring-turn');
setupClimaxBtn('climax-btn-card','ring-card');
tryAutoLoad();
</script>
