<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dare & Desire">
<meta name="theme-color" content="#05020a">
<title>Dare &amp; Desire</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Cinzel:wght@400;600;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#05020a;--surface:#0f0618;--surface2:#17082a;
  --crimson:#6b0f1e;--crimson2:#a8142e;--crimson3:#d41a3c;
  --gold:#c9a84c;--gold-l:#e2c16a;--gold-d:#7a6220;
  --cream:#f0e6d3;--cream-d:#8a7a6a;--white:#fff8f2;
  --blue:#7eb4e0;--pink:#e07eb4;
  --femme:#d4a0c0;--speeltje:#a0c4d4;
  --neon-red:rgba(212,26,60,0.7);--neon-gold:rgba(226,193,106,0.6);
  --neon-blue:rgba(126,180,224,0.6);--neon-pink:rgba(224,126,180,0.6);
  --r:12px;--r-lg:20px;--touch:52px;
  --cat-h:68px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--cream);font-family:'Cormorant Garamond',Georgia,serif;font-size:clamp(16px,4vw,18px);-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;background:
  radial-gradient(ellipse 90% 60% at 10% 90%,rgba(107,15,30,.35) 0%,transparent 55%),
  radial-gradient(ellipse 70% 50% at 90% 10%,rgba(100,20,160,.18) 0%,transparent 55%),
  radial-gradient(ellipse 50% 40% at 50% 50%,rgba(168,20,46,.06) 0%,transparent 60%);
pointer-events:none;z-index:0;animation:bgBreathe 9s ease-in-out infinite}
@keyframes bgBreathe{0%,100%{opacity:.7}50%{opacity:1}}

.screen{display:none;position:fixed;inset:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.screen.active{display:flex;flex-direction:column;animation:screenIn .3s ease forwards}
@keyframes screenIn{from{opacity:0}to{opacity:1}}
.screen-inner{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2.5rem 1.4rem 2rem;min-height:100%}
.screen-inner.top{justify-content:flex-start;padding-top:max(5rem,calc(env(safe-area-inset-top)+4rem))}
.screen-inner.game{justify-content:flex-start;align-items:stretch;padding-top:0;padding-left:0;padding-right:0;padding-bottom:calc(var(--cat-h) + env(safe-area-inset-bottom) + 16px);width:100%;box-sizing:border-box}
@media (min-width:760px){
  .screen-inner.game{padding-left:var(--sidebar-w);padding-bottom:2rem}
}

/* ── TYPOGRAPHY ── */
h1{font-family:'Cinzel',serif;font-size:clamp(1.9rem,8.5vw,3.2rem);font-weight:900;background:linear-gradient(140deg,var(--gold-l) 0%,var(--gold) 45%,var(--crimson3) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:.1em;text-align:center;line-height:1.1}
h2{font-family:'Cinzel',serif;font-size:clamp(.85rem,3.2vw,1.1rem);font-weight:600;color:var(--gold-l);letter-spacing:.07em;text-align:center}
.lbl{font-family:'Cinzel',serif;font-size:clamp(.52rem,1.9vw,.62rem);letter-spacing:.2em;text-transform:uppercase;color:var(--cream-d)}
.italic{font-style:italic;font-size:clamp(.88rem,3.5vw,1rem);color:var(--cream-d);text-align:center;line-height:1.65}
.div{width:100%;max-width:300px;height:1px;background:linear-gradient(90deg,transparent,var(--gold-d) 25%,var(--crimson2) 50%,rgba(100,20,160,.5) 75%,transparent);margin:.8rem auto;opacity:.5}
.sx{height:.4rem}.sm{height:.9rem}.smd{height:1.4rem}.slg{height:2rem}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp .4s ease forwards}
.fu-1{animation:fadeUp .4s .1s ease both}
.fu-2{animation:fadeUp .4s .2s ease both}
.fu-3{animation:fadeUp .4s .3s ease both}
.fu-4{animation:fadeUp .4s .4s ease both}
@keyframes cardIn{from{opacity:0;transform:scale(.87) translateY(24px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes cardPulse{0%,100%{box-shadow:0 8px 48px rgba(0,0,0,.7),0 0 0 1px rgba(168,20,46,.15)}50%{box-shadow:0 12px 64px rgba(0,0,0,.8),0 0 60px rgba(168,20,46,.2),0 0 0 1px rgba(201,168,76,.25)}}
@keyframes wGlow{from{text-shadow:0 0 40px currentColor}to{text-shadow:0 0 100px currentColor,0 0 180px rgba(201,168,76,.3)}}
@keyframes hbCrimson{0%,20%{box-shadow:0 4px 24px rgba(107,15,30,.5),0 0 0 1px rgba(168,20,46,.3);transform:scale(1)}22%{box-shadow:0 6px 50px rgba(212,26,60,.8),0 0 30px rgba(212,26,60,.4),0 0 0 1px rgba(212,26,60,.6);transform:scale(1.033)}30%{box-shadow:0 3px 20px rgba(107,15,30,.4);transform:scale(1)}38%{box-shadow:0 5px 35px rgba(107,15,30,.6),0 0 20px rgba(168,20,46,.3);transform:scale(1.016)}50%,100%{box-shadow:0 4px 24px rgba(107,15,30,.5),0 0 0 1px rgba(168,20,46,.3);transform:scale(1)}}
@keyframes hbGold{0%,20%{box-shadow:0 4px 20px rgba(201,168,76,.3),0 0 0 1px rgba(201,168,76,.25);transform:scale(1)}22%{box-shadow:0 6px 45px rgba(201,168,76,.75),0 0 25px rgba(201,168,76,.5),0 0 0 1px rgba(226,193,106,.7);transform:scale(1.033)}30%{box-shadow:0 3px 16px rgba(201,168,76,.2);transform:scale(1)}38%{box-shadow:0 5px 30px rgba(201,168,76,.5),0 0 15px rgba(201,168,76,.35);transform:scale(1.016)}50%,100%{box-shadow:0 4px 20px rgba(201,168,76,.3),0 0 0 1px rgba(201,168,76,.25);transform:scale(1)}}
@keyframes neonPulse{0%,100%{opacity:.6}50%{opacity:1}}
@keyframes logoFloat{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-7px) scale(1.05)}}
@keyframes selGlow{0%,100%{filter:brightness(1)}50%{filter:brightness(1.5) saturate(1.4)}}
.conf{position:fixed;pointer-events:none;z-index:150;animation:confFall linear forwards}
@keyframes confFall{0%{opacity:1;transform:translateY(-20px) rotate(0deg)}100%{opacity:0;transform:translateY(100vh) rotate(720deg)}}
.amb{position:fixed;border-radius:50%;pointer-events:none;z-index:0;animation:ambFloat linear infinite}
@keyframes ambFloat{0%{opacity:0;transform:translateY(0) translateX(0) scale(1)}8%{opacity:1}92%{opacity:.55}100%{opacity:0;transform:translateY(-110vh) translateX(var(--drift,0px)) scale(.4)}}

/* ── LOGO ── */
.logo-icon{font-size:2.8rem;display:block;text-align:center;animation:logoFloat 4.5s ease-in-out infinite}
.player-names{display:flex;align-items:center;gap:1rem;font-family:'Cinzel',serif}
.pname{font-size:clamp(1.1rem,4.5vw,1.6rem);font-weight:600;letter-spacing:.1em}
.pname.daddy{color:var(--blue)}.pname.meisje{color:var(--pink)}
.pname.femme{color:var(--femme)}.pname.speeltje{color:var(--speeltje)}
.pdivider{color:var(--gold);opacity:.45}

/* ── ROL KEUZE ── */
.rol-keuze{display:flex;flex-direction:column;gap:1rem;width:100%;max-width:360px}
.rol-btn{width:100%;min-height:80px;padding:1.1rem 1.6rem;border-radius:var(--r-lg);background:var(--surface);cursor:pointer;user-select:none;-webkit-user-select:none;transition:all .2s;text-align:center}
.rol-btn:active{transform:scale(.97)}
.rol-btn-title{font-family:'Cinzel',serif;font-size:clamp(.8rem,3vw,1rem);font-weight:600;letter-spacing:.1em;margin-bottom:.35rem}
.rol-btn-sub{font-style:italic;font-size:clamp(.78rem,3vw,.9rem);color:var(--cream-d);line-height:1.4}
.rol-btn.dm{border:1.5px solid rgba(126,180,224,.25);background:rgba(126,180,224,.04);box-shadow:0 0 20px rgba(126,180,224,.08),inset 0 0 20px rgba(126,180,224,.03)}
.rol-btn.dm:active,.rol-btn.dm:hover{border-color:rgba(126,180,224,.5);box-shadow:0 0 35px rgba(126,180,224,.2),inset 0 0 20px rgba(126,180,224,.06)}
.rol-btn.dm .rol-btn-title{background:linear-gradient(90deg,var(--blue),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.rol-btn.fs{border:1.5px solid rgba(212,160,192,.25);background:rgba(212,160,192,.04);box-shadow:0 0 20px rgba(212,160,192,.08),inset 0 0 20px rgba(212,160,192,.03)}
.rol-btn.fs:active,.rol-btn.fs:hover{border-color:rgba(212,160,192,.5);box-shadow:0 0 35px rgba(212,160,192,.2),inset 0 0 20px rgba(212,160,192,.06)}
.rol-btn.fs .rol-btn-title{background:linear-gradient(90deg,var(--femme),var(--speeltje));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* ── BUTTONS ── */
.btn{display:block;width:100%;max-width:360px;margin-left:auto;margin-right:auto;min-height:var(--touch);padding:.9rem 1.8rem;border:none;border-radius:var(--r);font-family:'Cinzel',serif;font-size:clamp(.72rem,2.8vw,.82rem);font-weight:600;letter-spacing:.12em;text-align:center;cursor:pointer;user-select:none;transition:transform .15s,opacity .15s;-webkit-user-select:none}
.btn:active{transform:scale(.96)}.btn+.btn{margin-top:.7rem}.btn:disabled{opacity:.28;pointer-events:none}
.btn-primary{background:linear-gradient(135deg,var(--crimson),var(--crimson3));color:var(--white);border:1px solid rgba(212,26,60,.4);box-shadow:0 4px 24px rgba(107,15,30,.5),0 0 0 1px rgba(168,20,46,.3)}
.btn-gold{background:linear-gradient(135deg,var(--gold-d),var(--gold));color:#180e00;border:1px solid rgba(201,168,76,.4);box-shadow:0 4px 20px rgba(201,168,76,.3)}
.btn-outline{background:transparent;border:1px solid rgba(201,168,76,.3);color:var(--gold)}
.btn-outline:active{background:rgba(201,168,76,.07)}
.btn-ghost{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);color:var(--cream-d);font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(.9rem,3.5vw,1rem);letter-spacing:.04em}
.btn-ok{background:linear-gradient(135deg,#0d2010,#175c17);color:#80e080;border:1px solid rgba(80,200,80,.3);box-shadow:0 4px 25px rgba(30,92,30,.3),0 0 15px rgba(80,200,80,.15)}
.btn-fail{background:linear-gradient(135deg,#200808,#5c1010);color:#e08080;border:1px solid rgba(200,80,80,.3);box-shadow:0 4px 25px rgba(92,20,20,.3),0 0 15px rgba(200,80,80,.15)}
.btn-reroll{background:rgba(201,168,76,.04);border:1px solid rgba(201,168,76,.2);color:rgba(201,168,76,.6);font-size:clamp(.66rem,2.5vw,.74rem);min-height:44px;padding:.6rem 1.4rem;letter-spacing:.13em;box-shadow:0 0 15px rgba(201,168,76,.08)}
.btn-reroll:active{background:rgba(201,168,76,.12);color:var(--gold);box-shadow:0 0 25px rgba(201,168,76,.2)}

/* ── CATEGORY NAV BAR ── */
:root{--sidebar-w:84px}
/* Mobile-first: bottom bar */
.cat-nav{position:fixed;left:0;right:0;bottom:0;height:var(--cat-h);background:rgba(5,2,10,.96);border-top:1px solid rgba(168,20,46,.2);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);z-index:40;display:none;align-items:stretch;padding-bottom:env(safe-area-inset-bottom)}
.cat-nav.visible{display:flex}
.cat-nav-inner{display:flex;align-items:stretch;gap:0;flex:1;overflow-x:auto;overflow-y:hidden;scrollbar-width:none;justify-content:center;min-width:0}
.cat-nav-inner::-webkit-scrollbar{display:none}
.cat-tab{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 .9rem;min-width:60px;cursor:pointer;user-select:none;-webkit-user-select:none;border-top:2px solid transparent;transition:all .2s;gap:2px;position:relative;flex-shrink:0}
.cat-tab:active{background:rgba(255,255,255,.04)}
.cat-tab.active{border-top-color:var(--crimson3)}
.cat-tab.active .cat-tab-icon{filter:drop-shadow(0 0 6px var(--crimson3))}
.cat-tab.active .cat-tab-lbl{color:var(--cream)}
.cat-tab-icon{font-size:1.1rem;line-height:1}
.cat-tab-lbl{font-family:'Cinzel',serif;font-size:.38rem;letter-spacing:.14em;text-transform:uppercase;color:var(--cream-d);white-space:nowrap}
.cat-tab-dot{position:absolute;top:8px;right:8px;width:5px;height:5px;border-radius:50%;background:var(--gold);box-shadow:0 0 6px var(--gold);display:none}
.cat-tab.has-dot .cat-tab-dot{display:block}
.topbar-side{display:flex;align-items:stretch;justify-content:center;flex-shrink:0}
.topbar-side+.topbar-side{border-left:1px solid rgba(255,255,255,.06)}
.topbar-stop{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;cursor:pointer;-webkit-user-select:none;user-select:none;padding:0 .9rem;min-width:60px;height:100%;transition:all .2s}
.topbar-stop:active{background:rgba(255,255,255,.04)}
.topbar-stop-icon{font-size:1rem;line-height:1;color:var(--cream-d)}
.topbar-stop-lbl{font-family:'Cinzel',serif;font-size:.38rem;letter-spacing:.14em;text-transform:uppercase;color:var(--cream-d)}
.cat-nav-climax{display:flex;align-items:center;justify-content:center;padding:.4rem}

/* Tablet/Desktop: left vertical sidebar */
@media (min-width:760px){
  .cat-nav{top:0;bottom:0;left:0;right:auto;width:var(--sidebar-w);height:100%;flex-direction:column;border-top:none;border-right:1px solid rgba(168,20,46,.2);padding-bottom:0;padding-top:env(safe-area-inset-top)}
  .cat-nav-inner{flex-direction:column;overflow-x:hidden;overflow-y:auto;justify-content:flex-start;padding-top:.5rem}
  .cat-tab{min-width:0;width:100%;padding:.85rem .5rem;border-top:none;border-left:2px solid transparent}
  .cat-tab.active{border-left-color:var(--crimson3);border-top-color:transparent}
  .cat-tab-icon{font-size:1.3rem}
  .cat-tab-lbl{font-size:.42rem}
  .topbar-side{flex-direction:column;width:100%;margin-top:auto}
  .topbar-side+.topbar-side{border-left:none;border-top:1px solid rgba(255,255,255,.06)}
  .topbar-stop{width:100%;min-width:0;padding:.85rem .5rem}
  .cat-nav-climax{padding:.7rem}
}

/* ── SCORE BAR ── */
.game-center{width:100%;max-width:560px;margin:0 auto;display:flex;flex-direction:column}
.score-bar{display:flex;align-items:center;justify-content:center;gap:clamp(1.5rem,8vw,4rem);padding:.6rem 0;width:100%;border-bottom:1px solid rgba(255,255,255,.05);position:sticky;top:0;z-index:30;background:rgba(5,2,10,.85);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);box-sizing:border-box}
.score-player{display:flex;flex-direction:column;align-items:center;gap:1px}
.score-num{font-family:'Cinzel',serif;font-size:clamp(1.4rem,6vw,1.9rem);font-weight:900;line-height:1;transition:transform .2s}
.score-num.daddy{color:var(--blue);text-shadow:0 0 20px rgba(126,180,224,.4)}
.score-num.meisje{color:var(--pink);text-shadow:0 0 20px rgba(224,126,180,.4)}
.score-num.femme{color:var(--femme);text-shadow:0 0 20px rgba(212,160,192,.4)}
.score-num.speeltje{color:var(--speeltje);text-shadow:0 0 20px rgba(160,196,212,.4)}
.score-lbl{font-family:'Cinzel',serif;font-size:.42rem;letter-spacing:.15em;color:var(--cream-d);text-transform:uppercase}
.score-vs{font-family:'Cinzel',serif;font-size:.6rem;color:var(--gold-d);letter-spacing:.1em}
.turn-badge{font-family:'Cinzel',serif;font-size:.48rem;letter-spacing:.15em;text-transform:uppercase;padding:.2rem .6rem;border-radius:20px;border:1px solid;animation:neonPulse 2s ease-in-out infinite}
.turn-badge.daddy{color:var(--blue);border-color:rgba(126,180,224,.3);background:rgba(126,180,224,.06);box-shadow:0 0 12px rgba(126,180,224,.2)}
.turn-badge.meisje{color:var(--pink);border-color:rgba(224,126,180,.3);background:rgba(224,126,180,.06);box-shadow:0 0 12px rgba(224,126,180,.2)}
.turn-badge.femme{color:var(--femme);border-color:rgba(212,160,192,.3);background:rgba(212,160,192,.06);box-shadow:0 0 12px rgba(212,160,192,.2)}
.turn-badge.speeltje{color:var(--speeltje);border-color:rgba(160,196,212,.3);background:rgba(160,196,212,.06);box-shadow:0 0 12px rgba(160,196,212,.2)}

/* ── GAME CONTENT AREA ── */
.game-content{padding:1.2rem 0 2rem;width:100%;box-sizing:border-box}

/* ── KAART ── */
.q-card{width:100%;background:var(--surface);border-radius:var(--r-lg);padding:clamp(1.4rem,5vw,2rem) clamp(1.2rem,4vw,1.6rem);text-align:center;box-shadow:0 8px 48px rgba(0,0,0,.7),0 0 0 1px rgba(168,20,46,.12);animation:cardIn .42s cubic-bezier(.34,1.56,.64,1) forwards,cardPulse 3.5s .5s ease-in-out infinite;position:relative;overflow:hidden}
.q-card::before{content:'';position:absolute;inset:0;border-radius:var(--r-lg);border:1px solid rgba(168,20,46,.25);pointer-events:none}
.q-card.gold-card::before{border-color:rgba(201,168,76,.3)}
.q-card.gold-card{box-shadow:0 8px 48px rgba(0,0,0,.7),0 0 0 1px rgba(201,168,76,.12),0 0 40px rgba(201,168,76,.08)}
.q-tags{display:flex;flex-wrap:wrap;gap:.3rem;justify-content:center;margin-bottom:.75rem}
.q-tag{padding:.22rem .6rem;border-radius:20px;font-family:'Cinzel',serif;font-size:clamp(.46rem,1.8vw,.54rem);letter-spacing:.12em;text-transform:uppercase}
.qt-opdracht{background:rgba(168,20,46,.12);color:#e05070;border:1px solid rgba(168,20,46,.3);box-shadow:0 0 8px rgba(168,20,46,.15)}
.qt-vraag{background:rgba(126,180,224,.12);color:var(--blue);border:1px solid rgba(126,180,224,.25);box-shadow:0 0 8px rgba(126,180,224,.15)}
.qt-mild{background:rgba(201,168,76,.1);color:var(--gold);border:1px solid rgba(201,168,76,.2)}
.qt-spicy{background:rgba(255,60,60,.1);color:#ff7575;border:1px solid rgba(255,60,60,.2);box-shadow:0 0 8px rgba(255,60,60,.12)}
.qt-cnc{background:rgba(201,168,76,.08);color:var(--gold-l);border:1px solid rgba(201,168,76,.25);box-shadow:0 0 8px rgba(201,168,76,.15)}
.qt-fase{background:rgba(212,160,192,.08);color:#c890aa;border:1px solid rgba(212,160,192,.15)}
.q-text{font-size:clamp(1.05rem,4vw,1.35rem);font-style:italic;color:var(--white);line-height:1.8;margin:.7rem 0 .4rem}

/* ── INTENSITY CHOOSER ── */
.choice-group{width:100%;margin-bottom:.8rem}
.choice-group-lbl{font-family:'Cinzel',serif;font-size:clamp(.52rem,1.9vw,.6rem);letter-spacing:.2em;text-transform:uppercase;color:var(--cream-d);text-align:center;margin-bottom:.5rem}
.choice-row{display:flex;gap:.45rem;flex-wrap:wrap;justify-content:center}
.cbtn{flex:1;min-width:70px;min-height:var(--touch);padding:.85rem .3rem;background:var(--surface);border:1.5px solid rgba(201,168,76,.08);border-radius:var(--r);font-family:'Cinzel',serif;font-size:clamp(.58rem,2.2vw,.68rem);font-weight:600;letter-spacing:.06em;color:var(--cream-d);text-align:center;cursor:pointer;user-select:none;transition:all .2s;-webkit-user-select:none}
.cbtn:active{transform:scale(.96)}
.cbtn.s-mild{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.08);box-shadow:0 0 15px rgba(201,168,76,.2),inset 0 0 10px rgba(201,168,76,.05);animation:selGlow 1.6s ease-in-out infinite}
.cbtn.s-spicy{border-color:#ff6060;color:#ff6060;background:rgba(255,96,96,.08);box-shadow:0 0 15px rgba(255,60,60,.2),inset 0 0 10px rgba(255,60,60,.05);animation:selGlow 1.6s ease-in-out infinite}
.cbtn.s-cnc{border-color:var(--gold-l);color:var(--gold-l);background:rgba(226,193,106,.06);box-shadow:0 0 15px rgba(226,193,106,.2),inset 0 0 10px rgba(226,193,106,.05);animation:selGlow 1.6s ease-in-out infinite}
.cbtn.s-vraag{border-color:var(--blue);color:var(--blue);background:rgba(126,180,224,.08);box-shadow:0 0 15px rgba(126,180,224,.2);animation:selGlow 1.6s ease-in-out infinite}

/* ── JUDGE ── */
.judge-lbl{font-family:'Cinzel',serif;font-size:clamp(.52rem,1.9vw,.6rem);letter-spacing:.18em;color:var(--cream-d);text-transform:uppercase;text-align:center;margin:1rem 0 .65rem}

let G = {

  assignedRules:{p1:[],p2:[]},

const CIRC = 2*Math.PI*22;

// ══════════════════════════════════════════
// SCREENS
// ══════════════════════════════════════════
const FOOTER_SCREENS = new Set(['screen-game']);
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
  const f=document.getElementById('rules-footer');
  if(FOOTER_SCREENS.has(id)&&G.rol){ f.classList.add('visible'); updateFooter(); }
  else{ f.classList.remove('visible','open'); }
}

// ══════════════════════════════════════════
// ROL & REGELS
// ══════════════════════════════════════════
function kiesRol(rol){
  G.rol=rol;
  initRules();
  showScreen('screen-rules');
}

function pickRules(playerData, hasVast){
  const rules=[];
  if(hasVast&&playerData.vast) rules.push({text:playerData.vast,vast:true});
  const pool=[...(playerData.random||[])].sort(()=>Math.random()-.5);
  const needed=2;
  pool.slice(0,needed).forEach(t=>rules.push({text:t,vast:false}));
  return rules;
}

function initRules(){
  const rc=ROL[G.rol];
  const d=DATA[G.rol].avondregels;
  G.assignedRules.p1=pickRules(d[rc.p1.key],false);
  G.assignedRules.p2=pickRules(d[rc.p2.key],true);
  renderRulesScreen();
}

function renderRulesScreen(){
  const rc=ROL[G.rol];
  renderRulesCard('rules-card-p1',rc.p1,G.assignedRules.p1,'p1');
  renderRulesCard('rules-card-p2',rc.p2,G.assignedRules.p2,'p2');
}

function renderRulesCard(elId,pc,rules,playerKey){
  const el=document.getElementById(elId);
  el.className=`rules-card fu-2 ${pc.cls}-card`;
  const vastRules=rules.filter(r=>r.vast);
  const randomRules=rules.filter(r=>!r.vast);
  let html=`<div class="rules-card-header ${pc.cls}">
    <span>${pc.name}</span>
    <button class="btn-reroll-rules" onclick="rerollRules('${playerKey}')">↺ Nieuwe regels</button>
  </div>`;
  if(vastRules.length){
    html+=`<div class="rule-section-lbl">VASTE REGEL</div>`;
    vastRules.forEach(r=>{
      html+=`<div class="rule-item vast">${r.text} <span class="vast-badge">VAST</span></div>`;
    });
  }
  if(randomRules.length){
    html+=`<div class="rule-section-lbl" style="margin-top:.5rem">AVONDREGEL${randomRules.length>1?'S':''}</div>`;
    randomRules.forEach(r=>{
      html+=`<div class="rule-item">${r.text}</div>`;
    });
  }
  el.innerHTML=html;
}

function rerollRules(playerKey){
  const rc=ROL[G.rol];
  const isP2=playerKey==='p2';
  const pc=isP2?rc.p2:rc.p1;
  const d=DATA[G.rol].avondregels[pc.key];
  const newRules=pickRules(d,isP2);
  G.assignedRules[playerKey]=newRules;
  renderRulesCard(`rules-card-${playerKey}`,pc,newRules,playerKey);
}

function setTab(tab){

  if(el){ el.classList.add('active'); el.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'}); }

function renderTab(){
  const content=document.getElementById('game-content');

// ══════════════════════════════════════════
// DRAW CARDS
// ══════════════════════════════════════════
function pickFrom(pool,exclude=[]){
  const excl=[...G.recent,...exclude];
  let c=pool.filter(t=>!excl.includes(t));
  if(!c.length) c=[...pool];
  return c[Math.floor(Math.random()*c.length)];
}
function addRecent(t){
  G.recent=G.recent.filter(x=>x!==t);
  G.recent.push(t);
  if(G.recent.length>MAX_RECENT) G.recent.shift();
}

function drawOpdracht(){
  const pc=currentPC();
  const catData=DATA[G.rol][G.tab];
  if(!catData){showEmptyCard();return;}
  let pool;
  if(catData[pc.key]&&catData[pc.key][G.intensity]) pool=catData[pc.key][G.intensity];
  else{showEmptyCard();return;}
  if(!pool||!pool.length){showEmptyCard();return;}
  const text=pickFrom(pool,[G.currentCard]);
  G.currentCard=text; addRecent(text);
  const isCNC=G.intensity==='cnc';
  showCard(text,'VOORSPEL',G.intensity,isCNC);
}

function drawHoofdspelCard(){
  const pc=currentPC();
  const hd=DATA[G.rol].hoofdspel;
  let pool, isCNC=false;
  if(G.rol==='dm'&&G.hoofdspelCnc){
    pool=hd.cnc&&hd.cnc[pc.key]?hd.cnc[pc.key]:[];
    isCNC=true;
  } else {
    pool=hd[pc.key]||[];
  }
  if(!pool.length){showEmptyCard();return;}
  const text=pickFrom(pool,[G.currentCard]);
  G.currentCard=text; addRecent(text);
  showCard(text,'HOOFDSPEL',isCNC?'cnc':'spicy',isCNC);
}

function drawVraag(){
  if(!G.vraagRol){ alert('Kies eerst voor wie de vraag is.'); return; }
  const pool=DATA[G.rol].vragen[G.vraagRol];
  if(!pool||!pool.length){showEmptyCard();return;}
  const text=pickFrom(pool,[G.currentCard]);
  G.currentCard=text; addRecent(text);
  showCard(text,'VRAAG','vraag',false);
}

function drawSimple(tab){
  const pool=DATA[G.rol][tab]||[];
  if(!pool.length){showEmptyCard();return;}
  const text=pickFrom(pool,[G.currentCard]);
  G.currentCard=text; addRecent(text);
  const isGold=tab==='buiten';
  const labels={video:'VIDEO',buiten:'AVONTUUR'};
  showCard(text,labels[tab]||tab.toUpperCase(),'special',isGold);
}

function drawClimaxCard(){
  const pc=currentPC();
  const climax=DATA[G.rol].climax;
  const pool=climax[pc.key]||[];
  if(!pool.length){showEmptyCard();return;}
  const text=pickFrom(pool,[G.currentCard]);
  G.currentCard=text; addRecent(text);
  showCard(text,'CLIMAX','climax',true);
}

function showEmptyCard(){
  const d=document.getElementById('card-display');
  if(d) d.innerHTML=`<p class="italic" style="text-align:center;color:var(--cream-d);padding:1rem">Geen opdrachten beschikbaar voor deze selectie.</p>`;
}

function showCard(text,labelTop,intensity,isGold){
  G.judged=false;
  // Verberg de trek-knop zodra een kaart getoond wordt
  const drawBtn=document.getElementById('draw-btn');
  if(drawBtn) drawBtn.style.display='none';
  const tagMap={
    'mild':'<span class="q-tag qt-mild">MILD</span>',
    'spicy':'<span class="q-tag qt-spicy">SPICY 🌶</span>',
    'cnc':'<span class="q-tag qt-cnc">✦ CNC ✦</span>',
    'vraag':'<span class="q-tag qt-vraag">VRAAG</span>',
    'climax':'<span class="q-tag qt-cnc">⚡ CLIMAX ⚡</span>',
    'special':'<span class="q-tag qt-fase">✦</span>'
  };
  const tag=tagMap[intensity]||'';
  const typeTag=`<span class="q-tag qt-opdracht">${labelTop}</span>`;
  const d=document.getElementById('card-display');
  d.innerHTML=`
    <div class="q-card${isGold?' gold-card':''}" id="active-card">
      <div class="q-tags">${typeTag}${tag}</div>
      <div class="q-text">${text}</div>
    </div>
    <div style="margin-top:.7rem">
      <button class="btn btn-reroll" onclick="rerollCurrent()">↺ &nbsp;Andere kaart</button>
    </div>
    <div id="judge-sec" style="margin-top:.7rem">
      <div class="judge-lbl">Beoordeel de uitvoering:</div>
      <button class="btn btn-ok" onclick="judge(true)">✓ &nbsp;GESLAAGD &nbsp;+1</button>
      <button class="btn btn-fail" onclick="judge(false)">✗ &nbsp;NIET GESLAAGD &nbsp;−1</button>
    </div>`;
}

function rerollCurrent(){
  const tab=G.tab;
  if(tab==='video'||tab==='buiten') drawSimple(tab);
  else if(tab==='vragen') drawVraag();
  else if(tab==='climax') drawClimaxCard();
  else if(tab==='hoofdspel') drawHoofdspelCard();
  else drawOpdracht();
}

// ══════════════════════════════════════════
// JUDGE
// ══════════════════════════════════════════
function judge(ok){
  if(G.judged) return;
  G.judged=true;
  G.scores[G.current]+=ok?1:-1;
  burstParticles(ok);
  const fl=document.getElementById('score-flash');
  fl.textContent=ok?'+1':'−1';
  fl.className=ok?'pos show':'neg show';
  document.querySelectorAll('#judge-sec .btn').forEach(b=>b.disabled=true);
  setTimeout(()=>{ fl.className=fl.className.replace('show','hide'); },700);
  setTimeout(()=>{
    fl.className='';
    G.current=1-G.current;
    G.judged=false;
    G.currentCard='';
    // Clear card display and re-render tab for new player
    renderTurnBadge();
    // Clear the card area
    const cd=document.getElementById('card-display');
    if(cd) cd.innerHTML='';
  },1300);
}

// ══════════════════════════════════════════
// CLIMAX FLOW
// ══════════════════════════════════════════
function showClimaxChoice(){
  const rc=ROL[G.rol];
  const [s0,s1]=G.scores;
  const isDraw=s0===s1;
  const wi=s0>s1?0:1;
  const wpc=wi===0?rc.p1:rc.p2;
  const wLbl=document.getElementById('cc-winner-lbl');
  const wName=document.getElementById('cc-winner-name');
  const sub=document.getElementById('cc-sub');
  if(isDraw){
    wLbl.textContent='GELIJKSPEL';
    wName.textContent=`${rc.p1.name} ♦ ${rc.p2.name}`;
    wName.className='climax-winner-name draw';
    sub.textContent='Jullie staan quitte — overleg samen welke heerlijke optie jullie kiezen om vanavond mee te eindigen.';
  } else {
    wLbl.textContent='WINNAAR';
    wName.textContent=wpc.name;
    wName.className=`climax-winner-name ${wpc.cls}`;
    sub.textContent=`Kies jouw beloning, ${wpc.name}. Dit heb je verdiend.`;
  }
  let opts;
  const c=DATA[G.rol].climax;
  if(isDraw){
    const pm=[...c[rc.p1.key]].sort(()=>Math.random()-.5);
    const pf=[...c[rc.p2.key]].sort(()=>Math.random()-.5);
    opts=[pm[0],pf[0],pm[1]||pf[1]||pm[0]];
  } else {
    const g=wi===0?rc.p1.key:rc.p2.key;
    opts=[...(c[g]||[])].sort(()=>Math.random()-.5).slice(0,3);
  }
  while(opts.length<3) opts.push(opts[0]);
  window._cx={opts,isDraw,wName:isDraw?`${rc.p1.name} ♦ ${rc.p2.name}`:wpc.name,wCls:isDraw?'draw':wpc.cls};
  const container=document.getElementById('cc-cards');
  container.innerHTML=opts.map((_,i)=>`
    <div class="climax-option" onclick="chooseClimaxByIdx(${i})">
      <div class="climax-option-num">Optie ${i+1}</div>
      <div class="climax-option-body">${opts[i]}</div>
    </div>`).join('');
  launchConfetti();
  showScreen('screen-climax-choice');
}

function chooseClimaxByIdx(idx){
  const {opts,isDraw,wName,wCls}=window._cx;
  const text=opts[idx];
  document.getElementById('cr-winner-lbl').textContent=isDraw?'GELIJKSPEL':'WINNAAR';
  const crName=document.getElementById('cr-winner-name');
  crName.textContent=wName;
  crName.className=`climax-reveal-wname ${wCls}`;
  document.getElementById('cr-text').textContent=text;
  launchConfetti();
  showScreen('screen-climax-reveal');
}

// ══════════════════════════════════════════
// CLIMAX HOLD BTN
// ══════════════════════════════════════════
function setupClimaxBtn(btnId,ringId){
  const btn=document.getElementById(btnId);
  const ring=document.getElementById(ringId);
  let timer=null,start=null,raf=null;
  function begin(e){ e.preventDefault(); start=Date.now(); timer=setTimeout(()=>{ cancel(); showClimaxChoice(); },800); raf=requestAnimationFrame(function tick(){ if(!start)return; const p=Math.min((Date.now()-start)/800,1); ring.setAttribute('stroke-dasharray',`${p*CIRC} ${CIRC}`); if(p<1) raf=requestAnimationFrame(tick); }); }
  function cancel(){ clearTimeout(timer);timer=null;cancelAnimationFrame(raf);raf=null;start=null;ring.setAttribute('stroke-dasharray',`0 ${CIRC}`); }
  btn.addEventListener('mousedown',begin);btn.addEventListener('touchstart',begin,{passive:false});
  btn.addEventListener('mouseup',cancel);btn.addEventListener('mouseleave',cancel);
  btn.addEventListener('touchend',cancel);btn.addEventListener('touchcancel',cancel);
}
setupClimaxBtn('climax-btn-game','ring-game');

// PARTICLES

function launchConfetti(){
  const cols=['#c9a84c','#e2c16a','#8b1a2b','#c41e3a','#f0e6d3','#9b6fd6','#7eb4e0','#e07eb4'];
  for(let i=0;i<52;i++) setTimeout(()=>{
    const el=document.createElement('div'); el.className='conf';
    const sz=5+Math.random()*9;
    el.style.cssText=`left:${Math.random()*100}vw;top:-14px;width:${sz}px;height:${sz}px;background:${cols[Math.floor(Math.random()*cols.length)]};border-radius:${Math.random()>.45?'50%':'2px'};animation-duration:${1.4+Math.random()*2.8}s;`;
    document.body.appendChild(el); setTimeout(()=>el.remove(),4600);
  },i*48);
}
function burstParticles(ok){
  const cols=ok?['#80e080','#50d050','#c0ffc0','#fff']:['#e08080','#d05050','#ffc0c0','#fff'];
  for(let i=0;i<24;i++){
    const el=document.createElement('div');
    const a=(i/24)*Math.PI*2+Math.random()*.4,d=55+Math.random()*115,s=4+Math.random()*7;
    el.style.cssText=`position:fixed;left:50vw;top:50vh;width:${s}px;height:${s}px;border-radius:50%;background:${cols[Math.floor(Math.random()*cols.length)]};pointer-events:none;z-index:200;transform:translate(-50%,-50%);transition:transform .55s cubic-bezier(.2,1,.3,1),opacity .55s ease-out;opacity:1;`;
    document.body.appendChild(el);
    requestAnimationFrame(()=>requestAnimationFrame(()=>{ el.style.transform=`translate(calc(-50% + ${Math.cos(a)*d}px),calc(-50% + ${Math.sin(a)*d}px)) scale(0)`; el.style.opacity='0'; }));
    setTimeout(()=>el.remove(),660);
  }
}

    const el=document.createElement('div'),sz=2+Math.random()*5,col=pal[Math.floor(Math.random()*pal.length)],op=.08+Math.random()*.18,dur=10+Math.random()*15;
    el.className='amb';
    el.style.cssText=`width:${sz}px;height:${sz}px;background:${col}${op});left:${Math.random()*100}vw;bottom:-20px;--drift:${(Math.random()-.5)*85}px;animation-duration:${dur}s;animation-delay:${-(Math.random()*dur)}s;`;
    document.body.appendChild(el);
  }
})();

let wl=null;
async function reqWL(){ try{ if('wakeLock' in navigator) wl=await navigator.wakeLock.request('screen'); }catch{} }
document.addEventListener('visibilitychange',()=>{ if(document.visibilityState==='visible') reqWL(); });
reqWL();
</script>
